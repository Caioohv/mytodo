<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Mytodo</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='css/main.css'>
    <!-- FontAwesome p/ links -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w==" crossorigin="anonymous" />
    


    <!-- Icons -->
    <!-- Adicionar          <i class="fas fa-plus-square"></i>  -->
    <!-- Remover            <i class="far fa-trash-alt"></i>    -->
    <!-- Editar             <i class="far fa-edit"></i>         -->
    <!-- Check              <i class="fas fa-check"></i>        -->



</head>
<body>
    <div class="tudo">
        <!-- Título -->
        <header class="titulo">
            <h1>My<span>todo</span></h1>
            <p>Sua lista de afazeres simples e online</p>
        </header>

        <!-- Sessão do Input -->
        <div class="div-entrada">
            <form>
                <!-- Entrada do Nome -->
                <input type="text" class="mtd-input">
                
                <!-- Botão de Add -->
                <button class="mtd-btn" type="submit">
                    <i class="fas fa-plus-square"></i>
                </button>
                <div class="select">
                    <select name="todos" class="filtro">
                        <option value="todos">Todos</option>
                        <option value="completo">Completo</option>
                        <option value="incompleto">Incompleto</option>
                    </select>
                </div>
            </form>
        </div>
        <!-- Lista, em essência -->
    
    </div>
    <div class="div-lista">
        <ul class="mtd-lista">

            <div class="todo-list">
                
            </div>

        </ul>
    </div>
    

    <script src='js/main.js'></script>
</body>
</html>
